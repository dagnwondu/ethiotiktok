{% block content %}
 {% if messages %}
<div class="alert alert-info">
  {% for message in messages %}
  <div class="alert alert-{{ message.tags }}">{{ message }}</div>
  {% endfor %}
</div>
{% endif %}

<div class="container-fluid my-2 text-primary">
   <div class="d-flex flex-wrap gap-2">
