{% extends "base.html" %}

{% block title %}Server Error - 500{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card text-center shadow p-4">
                <div class="card-body">
                    <i class="bi bi-bug-fill display-1 text-danger mb-3"></i>
                    <h1 class="display-3 text-danger">500</h1>
                    <h3 class="mb-3">Internal Server Error</h3>
                    <p class="mb-4">Something went wrong on our side. Please try again later.</p>
                    <a href="{% url 'dashboard' %}" class="btn btn-primary btn-lg">
                        <i class="bi bi-house-door-fill"></i> Go to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
