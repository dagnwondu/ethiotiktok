{% extends "base.html" %}

{% block title %}Page Not Found - 404{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card text-center shadow p-4">
                <div class="card-body">
                    <i class="bi bi-exclamation-triangle-fill display-1 text-danger mb-3"></i>
                    <h1 class="display-3 text-danger">404</h1>
                    <h3 class="mb-3">Oops! Page Not Found</h3>
                    <p class="mb-4">The page you are looking for does not exist or may have been moved.</p>
                    <a href="{% url 'dashboard' %}" class="btn btn-primary btn-lg">
                        <i class="bi bi-house-door-fill"></i> Go to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
