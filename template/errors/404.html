{% extends "base.html" %}

{% block title %}Access Denied - 403{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card text-center shadow p-4">
                <div class="card-body">
                    <i class="bi bi-lock-fill display-1 text-warning mb-3"></i>
                    <h1 class="display-3 text-warning">403</h1>
                    <h3 class="mb-3">Access Denied</h3>
                    <p class="mb-4">You do not have permission to view this page.</p>
                    <a href="{% url 'dashboard' %}" class="btn btn-primary btn-lg">
                        <i class="bi bi-house-door-fill"></i> Go to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
